<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>dockwatch — login</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg" />
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body class="login-body">
  <form id="login-form" class="login-card">
    <h1><img src="/assets/logo.svg" alt="" class="brand-logo" /><span class="brand-name"><span class="brand-dock">Dock</span><span class="brand-watch">Watch</span></span></h1>
    <label>
      Username
      <input type="text" name="username" autocomplete="username" required autofocus />
    </label>
    <label>
      Password
      <input type="password" name="password" autocomplete="current-password" required />
    </label>
    <button type="submit">Sign in</button>
    <p id="login-error" class="error" hidden>Invalid credentials</p>
  </form>

  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.hidden = true;
      const body = Object.fromEntries(new FormData(form).entries());
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        errorEl.hidden = false;
      }
    });
  </script>
</body>
</html>
