name: Release Finalize

# Phase 2 of 2: runs when a release/* PR is merged into main (see release.yml).
# Tags the merge commit, builds and pushes the Docker image to Docker Hub,
# publishes the GitHub Release, opens a PR to sync main back into develop
# (auto-merged - develop is protected, so this goes through the same
# required-PR path as everything else instead of a bypass), and deletes the
# release branch.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-finalize-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read released version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Tag the release merge commit
        run: |
          git tag -a "${{ steps.version.outputs.value }}" -m "${{ steps.version.outputs.value }}"
          git push origin "${{ steps.version.outputs.value }}"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            darks1d3r/opendockwatch:${{ steps.version.outputs.value }}
            darks1d3r/opendockwatch:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.value }}" \
            --title "${{ steps.version.outputs.value }}" \
            --target main \
            --generate-notes

      - name: Open a PR to sync develop with the released main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin develop
          if git diff --quiet origin/develop main; then
            echo "develop already matches main, nothing to sync"
            exit 0
          fi

          SYNC_BRANCH="chore/sync-develop-${{ steps.version.outputs.value }}"
          git checkout -b "$SYNC_BRANCH" main
          git push origin "$SYNC_BRANCH"
          gh pr create \
            --base develop \
            --head "$SYNC_BRANCH" \
            --title "Sync develop after ${{ steps.version.outputs.value }} release" \
            --body "Automated merge-back of \`main\` into \`develop\` after the ${{ steps.version.outputs.value }} release (mainly the version bump commit), so \`develop\` doesn't drift from what was just released. Opened by release-finalize.yml, set to auto-merge."
          gh pr merge "$SYNC_BRANCH" --auto --merge

      - name: Delete release branch
        run: git push origin --delete "${{ github.event.pull_request.head.ref }}" || true
