name: Release Finalize

# Phase 2 of 2: runs when a release/* PR is merged into main (see release.yml).
#
# 1. finalize: tags the merge commit, publishes the GitHub Release, opens a PR
#    to sync main back into develop (auto-merged - develop is protected, so
#    this goes through the same required-PR path as everything else instead
#    of a bypass), and deletes the release branch.
# 2. docker-build: builds and pushes the Docker image for each platform on a
#    native runner for that arch (no QEMU) - node:20-alpine has no prebuilt
#    musl binary for better-sqlite3, so it always compiles from source, and
#    doing that under QEMU emulation for arm64 is extremely slow. Each arch
#    is pushed by digest only, not a final tag.
# 3. docker-manifest: combines the per-arch digests into the real
#    darks1d3r/opendockwatch:<version> and :latest multi-arch tags.

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: release-finalize-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read released version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Tag the release merge commit
        run: |
          git tag -a "${{ steps.version.outputs.value }}" -m "${{ steps.version.outputs.value }}"
          git push origin "${{ steps.version.outputs.value }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.value }}" \
            --title "${{ steps.version.outputs.value }}" \
            --target main \
            --generate-notes

      - name: Open a PR to sync develop with the released main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin develop
          if git diff --quiet origin/develop main; then
            echo "develop already matches main, nothing to sync"
            exit 0
          fi

          SYNC_BRANCH="chore/sync-develop-${{ steps.version.outputs.value }}"
          git checkout -b "$SYNC_BRANCH" main
          git push origin "$SYNC_BRANCH"
          gh pr create \
            --base develop \
            --head "$SYNC_BRANCH" \
            --title "Sync develop after ${{ steps.version.outputs.value }} release" \
            --body "Automated merge-back of \`main\` into \`develop\` after the ${{ steps.version.outputs.value }} release (mainly the version bump commit), so \`develop\` doesn't drift from what was just released. Opened by release-finalize.yml."

          # Best-effort: requires "Allow auto-merge" under Settings -> General -> Pull Requests.
          # The PR itself is already open and safe to merge manually either way, so a repo where
          # that setting is off (or an org policy blocks it) shouldn't fail this job over it.
          if gh pr merge "$SYNC_BRANCH" --auto --merge; then
            echo "auto-merge enabled on $SYNC_BRANCH"
          else
            echo "::warning::Could not enable auto-merge on $SYNC_BRANCH (likely 'Allow auto-merge' is off under Settings -> General -> Pull Requests). The PR is open - merge it manually."
          fi

      - name: Delete release branch
        run: git push origin --delete "${{ github.event.pull_request.head.ref }}" || true

  docker-build:
    needs: finalize
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.finalize.outputs.version }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=darks1d3r/opendockwatch,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    needs: [finalize, docker-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t darks1d3r/opendockwatch:${{ needs.finalize.outputs.version }} \
            -t darks1d3r/opendockwatch:latest \
            $(printf 'darks1d3r/opendockwatch@sha256:%s ' *)

      - name: Verify pushed tags
        run: |
          docker buildx imagetools inspect darks1d3r/opendockwatch:${{ needs.finalize.outputs.version }}
