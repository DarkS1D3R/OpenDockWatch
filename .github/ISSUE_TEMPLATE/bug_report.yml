name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OpenDockWatch version / commit
    validations:
      required: true
  - type: dropdown
    id: setup
    attributes:
      label: Setup
      options:
        - Local Docker socket only
        - Local + remote hosts over SSH
        - Remote hosts only
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Server console output, browser console errors, etc. Redact hostnames/IPs if needed.
      render: shell
