services:
  opendockwatch:
    build: .
    image: opendockwatch:local
    container_name: opendockwatch
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.ssh:/root/.ssh:ro
      - ./config:/app/config
      - ./data:/app/data
      - ./.env:/app/.env:ro
